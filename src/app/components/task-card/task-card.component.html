<mat-card class="task-card" [ngClass]="'priority-' + task().priority">
  <mat-card-header>
    <mat-card-title>{{ task().title }}</mat-card-title>
    <mat-card-subtitle>Prioridad: {{ task().priority }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <p>{{ task().description }}</p>
  </mat-card-content>

  <mat-card-actions align="end">
    <button class="btn-action edit" matTooltip="Editar tarea" matMiniFab color="primary" (click)="onEdit(task())"
      aria-label="Editar tarea">
      <mat-icon>edit</mat-icon>
    </button>

    <button class="btn-action delete" matTooltip="Eliminar tarea" matMiniFab color="warn" (click)="onDelete()"
      aria-label="Eliminar tarea">
      <mat-icon>delete</mat-icon>
    </button>
  </mat-card-actions>
</mat-card>
